<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧘</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/css/base.css">
    <link rel="stylesheet" href="static/css/header-footer.css">
    <link rel="stylesheet" href="static/css/login.css">
    <link rel="stylesheet" href="static/css/alerts.css">
    <title>ZenFlow Yoga - Login</title>
</head>
<body class="pagina-login">
    <!-- Encabezado -->
    <header></header>
    
    <!-- Mensajes Flash -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }} alert-flash">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    
    <!-- Principal -->
    <main>
        <div class="formulario">
            <h1>Iniciar Sesión</h1>
            <form action="/login" method="POST">
                <div class="username">
                    <input type="text" required name="correo" value="{{ correo or '' }}" id="correo">
                    <label for="correo">Correo Electrónico</label>
                </div>
                <div class="username">
                    <input type="password" required name="password" value="{{ password or '' }}" id="password">
                    <label for="password">Contraseña</label>
                </div>
                <input type="submit" value="Iniciar Sesión">
                <div class="registrarse">
                    ¿No tienes cuenta? <a href="{{ url_for('registro') }}">Regístrate</a>
                </div>
            </form>
        </div>
    </main>
    
    <!-- Scripts -->
    <script>
        const rutas = {
            index: "{{ url_for('index') }}",
            reservas: "{{ url_for('reservas') }}",
            contacto: "{{ url_for('contacto') }}",
            yogui:"{{url_for('yogui')}}",
            login: "{{ url_for('login') }}",
            admin: "{{url_for('admin')}}",
            paquete: "{{ url_for('paquetes')}}"
        };
    </script>
    <script src="static/js/header-footer-dinamico.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>
</html>
